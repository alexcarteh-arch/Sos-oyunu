<!DOCTYPE html>
<html>
<head>
    <title>SOS Game</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/games.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1c1c1c; color: white; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 2em; cursor: pointer; border-radius: 8px; }
        .cell:active { background: #444; }
        #status { margin-top: 20px; font-weight: bold; }
        #score { color: #f39c12; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>SOS GAME</h2>
    <div id="score">Skor: 0</div>
    <div id="status">Sıra: X</div>
    <div class="grid" id="board"></div>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let score = 0;

        function createBoard() {
            const board Div = document.getElementById("board");
            boardDiv.innerHTML = "";
            board.map((val, i) => {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.innerText = val;
                cell.onclick = () => makeMove(i);
                boardDiv.appendChild(cell);
            });
        }

        function makeMove(i) {
            if (board[i] === "") {
                board[i] = currentPlayer;
                if (checkWin()) {
                    score += 10;
                    document.getElementById("score").innerText = "Skor: " + score;
                    alert(currentPlayer + " Kazandı!");
                    reset();
                } else {
                    currentPlayer = currentPlayer === "X" ? "O" : "X";
                    document.getElementById("status").innerText = "Sıra: " + currentPlayer;
                }
                createBoard();
            }
        }

        function checkWin() {
            const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            return wins.some(comb => board[comb[0]] && board[comb[0]] === board[comb[1]] && board[comb[0]] === board[comb[2]]);
        }

        function reset() { board = ["", "", "", "", "", "", "", "", ""]; currentPlayer = "X"; }
        createBoard();
    </script>
</body>
</html>
