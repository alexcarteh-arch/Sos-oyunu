<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeonChat Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">

    <div id="loginScreen" class="full-screen">
        <div class="auth-container">
            <h1 class="logo-auth">NeonChat</h1>
            <input type="text" id="usernameInput" placeholder="Kullanıcı Adı..." autocomplete="off">
            <input type="password" id="passwordInput" placeholder="Şifre..." autocomplete="off">
            <button class="primary-btn" onclick="registerUser()">KAYIT OL</button>
            <button class="secondary-btn" onclick="loginUser()">GİRİŞ YAP</button>
            <small id="authStatus"></small>
        </div>
    </div>

    <div id="appScreen" class="main-container hidden">
        <header class="app-header">
            <div class="header-top">
                <span class="logo">NeonChat</span>
                <div class="header-icons">
                    <button class="icon-btn" onclick="openProfile()">👤</button>
                    <button class="icon-btn" onclick="openSettings()">⚙️</button>
                </div>
            </div>
            <nav class="app-tabs">
                <div class="tab active" onclick="switchTab('chats')">SOHBETLER</div>
                <div class="tab" onclick="switchTab('status')">DURUM</div>
                <div class="tab" onclick="switchTab('calls')">ARAMALAR</div>
            </nav>
        </header>

        <main class="content-area" id="mainContent">
            <div class="chat-list" id="chats">
                <div class="chat-item" onclick="openChat('Alex Pro')">
                    <div class="avatar-wrapper">
                        <img src="https://i.pravatar.cc/100?u=1" alt="">
                        <span class="status-dot online"></span>
                    </div>
                    <div class="chat-info">
                        <div class="chat-row">
                            <span class="chat-name">Alex Pro</span>
                            <span class="chat-time">14:20</span>
                        </div>
                        <div class="chat-row">
                            <span class="chat-msg"><i>Yazıyor...</i></span>
                            <span class="unread-count">3</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="chatWindow" class="chat-window hidden">
        <header class="chat-window-header">
            <button class="back-btn" onclick="closeChat()">←</button>
            <div class="user-meta" onclick="openContactInfo()">
                <span id="targetName">Kullanıcı</span>
                <small id="targetStatus">Çevrimiçi</small>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="startCall('voice')">📞</button>
                <button class="icon-btn" onclick="startCall('video')">📹</button>
            </div>
        </header>
        <div class="messages-container" id="msgBox"></div>
        <footer class="input-row">
            <button class="icon-btn attach-btn">+</button>
            <input type="text" id="msgInput" placeholder="Mesaj yazın..." oninput="showTyping()">
            <button id="sendBtn" onclick="sendMsg()">➤</button>
        </footer>
    </div>

    <div id="callWindow" class="call-window hidden">
        <div class="remote-video">
            <img src="https://i.pravatar.cc/300?u=1" alt="" class="caller-avatar">
            <span>Bağlanıyor...</span>
        </div>
        <div class="local-video">Sen</div>
        <div class="call-controls">
            <button class="call-btn end-call" onclick="endCall()">🔇</button>
            <button class="call-btn hangup-call" onclick="endCall()">挂</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
