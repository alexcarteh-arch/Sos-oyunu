<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS NEON ULTIMATE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanline"></div>
    
    <div class="game-wrapper">
        <h1 class="title">SOS PRO</h1>
        
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-header">
                    <span class="label">OYUNCU RÜTBESİ</span>
                    <span class="level-badge">LVL <span id="lvl">1</span></span>
                </div>
                <span class="value" id="rankDisplay">ACEMİ</span>
                <div class="career-progress"><div class="progress-fill" id="xpBar"></div></div>
            </div>
        </div>

        <div class="score-row">
            <div class="score-box s-color">S: <span id="scoreS">0</span></div>
            <div class="score-box info-color" id="turnDisplay">S SIRASI</div>
            <div class="score-box o-color">O: <span id="scoreO">0</span></div>
        </div>

        <div class="grid" id="gameGrid"></div>

        <div class="controls">
            <button class="control-btn" onclick="resetGame()">SİSTEMİ SIFIRLA</button>
        </div>
        
        <div class="footer-stats">
            <span>XP: <span id="xpText">0</span>/100</span>
            <span>TOPLAM GALİBİYET: <span id="winsText">0</span></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
