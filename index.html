<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS NEON ULTIMATE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanline"></div>
    
    <div class="game-wrapper">
        <h1 class="title">SOS</h1>
        
        <div class="stats-container">
            <div class="stat-card s-player">
                <span class="label">P1 (S) - REÜTBE</span>
                <span class="value" id="scoreS">MASTER</span>
                <div class="career-progress"><div class="progress-fill" style="width: 75%;"></div></div>
            </div>
            <div class="stat-card o-player">
                <span class="label">P2 (O) - REÜTBE</span>
                <span class="value" id="scoreO">ELITE</span>
                <div class="career-progress"><div class="progress-fill" style="width: 40%;"></div></div>
            </div>
        </div>

        <div class="grid" id="gameGrid">
            <div class="slot s-mark">S</div>
            <div class="slot o-mark">O</div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>

        <button class="control-btn" onclick="resetGame()">SYSTEM REBOOT</button>
        
        <div style="margin-top: 15px; font-size: 0.7rem; color: #444; text-transform: uppercase;">
            Terminal Status: <span style="color: var(--accent-cyan);">Online</span> | Kernel: 5.15.0-SOS
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
