<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeonChat Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="loginScreen" class="full-screen">
        <div class="auth-box">
            <h1 class="neon-text">NeonChat</h1>
            <input type="text" id="usernameInput" placeholder="Kullanıcı Adı Seç..." autocomplete="off">
            <button onclick="startApp()" class="start-btn">SOHBETE BAŞLA</button>
        </div>
    </div>

    <div id="appScreen" class="app-container hidden">
        <header class="chat-header">
            <div class="user-info">
                <span class="online-dot"></span>
                <span id="myUsername">Misafir</span>
            </div>
            <button class="settings-btn">⋮</button>
        </header>

        <main class="chat-box" id="msgBox"></main>

        <footer class="input-area">
            <input type="text" id="msgInput" placeholder="Mesajını yaz..." autocomplete="off">
            <button id="sendBtn" onclick="sendMsg()">➤</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
